name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # The synthetic test only exercises the Qt-free core, so we install
        # numpy + the headless OpenCV build (no display / Qt system libs).
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy "opencv-python-headless>=4.7"

      - name: Run synthetic tests
        run: python tests/test_synthetic.py
